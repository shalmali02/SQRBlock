<!DOCTYPE html>
<html>
<head>
    <title>SQRBlock Login</title>
    <style>
        body{
            font-family:Arial;
            background:#f7f9fc;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .card{
            background:white;
            padding:30px;
            width:350px;
            border-radius:10px;
            box-shadow:0 4px 15px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            color:#2c3e50;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:14px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:10px;
            background:#27ae60;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:15px;
        }

        button:hover{
            background:#219150;
        }

        .error{
            color:red;
            text-align:center;
            margin-top:10px;
            font-size:14px;
        }

        .demo{
            margin-top:20px;
            font-size:13px;
            color:#555;
            background:#f4f4f4;
            padding:12px;
            border-radius:6px;
        }

        .demo b{
            color:#2c3e50;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>SQRBlock Login</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Enter Username" required>
        <input type="password" name="password" placeholder="Enter Password" required>
        <button type="submit">Login</button>
    </form>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <div class="demo">
        <b>Demo Users:</b><br><br>
        Admin → <b>admin</b> / admin123<br>
        Manufacturer → <b>manufacturer</b> / manu123<br>
        Distributor → <b>distributor</b> / dist123<br>
        Retailer → <b>retailer</b> / retail123
    </div>
</div>

</body>
</html>
