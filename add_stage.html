<!DOCTYPE html>
<html>
<head>
    <title>Add Supply Chain Stage</title>
    <style>
        body{
            font-family:Arial;
            background:#f7f9fc;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .card{
            background:white;
            padding:30px;
            width:400px;
            border-radius:10px;
            box-shadow:0 4px 15px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            color:#2c3e50;
            margin-bottom:20px;
        }

        .role{
            text-align:center;
            margin-bottom:15px;
            color:#555;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:14px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:10px;
            background:#3498db;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:15px;
        }

        button:hover{
            background:#2980b9;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Add Supply Chain Stage</h2>

    <div class="role">Logged in as: {{ role.capitalize() }}</div>

    <form method="POST">
        <input type="text" name="actor" placeholder="Enter Actor Name" required>
        <input type="text" name="location" placeholder="Enter Location" required>
        <button type="submit">Add Stage</button>
    </form>
</div>

</body>
</html>
